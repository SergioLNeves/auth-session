<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Recuperar Senha - Auth Session</title>
        <link rel="stylesheet" href="/css/password.css" />
    </head>
    <body>
        <div class="password-container">
            <div class="password-header">
                <div class="icon-lock">🔒</div>
                <h1>Recuperar Senha</h1>
                <p>Informe seu e-mail para receber instruções de recuperação</p>
            </div>

            <div class="success-message" id="successMessage">{{.Success}}</div>

            <div class="error-message" id="errorMessage">{{.Error}}</div>

            <form action="/password" method="POST">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="seu@email.com"
                        required
                        value="{{.Email}}"
                    />
                </div>

                <button type="submit" class="btn-submit">
                    Enviar Link de Recuperação
                </button>

                <div class="form-footer">
                    <a href="/login">← Voltar para o login</a>
                </div>
            </form>

            <div class="info-box">
                <strong>💡 Dica:</strong> Verifique sua caixa de spam caso não
                receba o e-mail em alguns minutos.
            </div>
        </div>
        <script src="/js/auth.js"></script>
        <script src="/js/password.js"></script>
        <script>requireGuest();</script>
    </body>
</html>
